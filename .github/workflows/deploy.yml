name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"] # 當 main 分支有更新時觸發

  # 允許手動從 GitHub 介面觸發
  workflow_dispatch:

# 設定 GitHub Actions 的權限，允許它部署到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 確保同一時間只有一個部署在執行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: ${{ secrets.PATH_TO_CACHE || 'npm' }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # Next.js 靜態導出後預設的資料夾

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
